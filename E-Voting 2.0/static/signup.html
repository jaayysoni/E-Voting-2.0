<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Voting 2.0 | Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <main class="min-h-screen flex items-center justify-center px-4">

    <!-- ================= Signup Card ================= -->
    <section class="bg-white w-full max-w-md rounded-xl shadow-md p-8">

      <!-- ========== Header Section ========== -->
      <header class="text-center mb-6">
        <h1 class="text-2xl font-bold text-green-600">
          E-Voting <span class="text-gray-400 text-sm">v2.0</span>
        </h1>
        <p class="text-gray-500 mt-2">Create Your Voter Account</p>
      </header>

      <!-- ========== Google OAuth Section ========== -->
      <section class="mb-6">
        <button
          class="w-full flex items-center justify-center gap-3 border py-2 rounded-lg hover:bg-gray-50 transition"
        >
          <img
            src="https://www.svgrepo.com/show/475656/google-color.svg"
            alt="Google"
            class="w-5 h-5"
          />
          <span class="text-gray-700 font-medium">
            Sign up with Google
          </span>
        </button>
      </section>

      <!-- ========== Divider Section ========== -->
      <section class="flex items-center mb-6">
        <div class="flex-1 border-t"></div>
        <span class="px-3 text-sm text-gray-400">OR</span>
        <div class="flex-1 border-t"></div>
      </section>

      <!-- ========== Manual Signup Section ========== -->
      <section>
        <form class="space-y-4">

          <!-- Full Name -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
              Full Name
            </label>
            <input
              type="text"
              placeholder="Enter your full name"
              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
              required
            />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
              Email Address
            </label>
            <input
              type="email"
              placeholder="Enter your email"
              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
              required
            />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
              Password
            </label>
            <input
              type="password"
              placeholder="Create a password"
              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
              required
            />
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">
              Confirm Password
            </label>
            <input
              type="password"
              placeholder="Re-enter password"
              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
              required
            />
          </div>

          <!-- Signup Action -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-green-500 to-blue-500 text-white py-2 rounded-lg font-semibold hover:opacity-90 transition"
          >
            Create Account
          </button>

        </form>
      </section>

      <!-- ========== Login Redirect Section ========== -->
      <section class="mt-6 text-center">
        <p class="text-sm text-gray-500">
          Already have an account?
          <a href="#" class="text-blue-500 hover:underline">Login</a>
        </p>
      </section>

      <!-- ========== Footer Section ========== -->
      <footer class="mt-4 text-center">
        <p class="text-xs text-gray-400">
          © 2026 E-Voting System. All rights reserved.
        </p>
      </footer>

    </section>

  </main>

</body>
</html>
