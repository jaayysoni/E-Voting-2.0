<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Voting 2.0 | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <div class="min-h-screen flex items-center justify-center px-4">

    <!-- Login Card -->
    <div class="bg-white w-full max-w-md rounded-xl shadow-md p-8">

      <!-- Header -->
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-green-600">
          E-Voting <span class="text-gray-400 text-sm">v2.0</span>
        </h1>
        <p class="text-gray-500 mt-2">Secure & Transparent Voting</p>
      </div>

      <!-- Manual Login -->
      <form class="space-y-4">

        <!-- Elector ID -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">
            Elector ID
          </label>
          <input
            type="text"
            placeholder="Enter your Elector ID"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
            required
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">
            Password
          </label>
          <input
            type="password"
            placeholder="Enter your password"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
            required
          />
        </div>

        <!-- Forgot Password -->
        <div class="flex justify-end">
          <a href="#" class="text-sm text-blue-500 hover:underline">
            Forgot password?
          </a>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          class="w-full bg-gradient-to-r from-green-500 to-blue-500 text-white py-2 rounded-lg font-semibold hover:opacity-90 transition"
        >
          Login
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t"></div>
        <span class="px-3 text-sm text-gray-400">OR</span>
        <div class="flex-1 border-t"></div>
      </div>

      <!-- Google OAuth -->
      <button
        class="w-full flex items-center justify-center gap-3 border py-2 rounded-lg hover:bg-gray-50 transition"
      >
        <img
          src="https://www.svgrepo.com/show/475656/google-color.svg"
          alt="Google"
          class="w-5 h-5"
        />
        <span class="text-gray-700 font-medium">
          Continue with Google
        </span>
      </button>

      <!-- Footer -->
      <p class="text-center text-xs text-gray-400 mt-6">
        © 2026 E-Voting System. All rights reserved.
      </p>

    </div>

  </div>

</body>
</html>
